name: MLB Weather Flags

on:
  schedule:
    # 5am CDT (UTC-5 in summer) = 10:00 UTC
    - cron: '0 10 * * *'
    # 5pm CDT = 22:00 UTC
    - cron: '0 22 * * *'
  # Manual trigger — use this to test or force a refresh anytime
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run weather flag tool
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python weather_flag_tool.py

      - name: Commit and push updated HTML
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          # Only commit if there are changes
          git diff --staged --quiet || \
            git commit -m "Update weather flags $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
